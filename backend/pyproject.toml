[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tunatale-backend"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.104.0",
    "uvicorn>=0.24.0",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.0.0",
    "httpx>=0.25.0",
    "python-dotenv>=1.0.0",
    "edge-tts>=6.1.0",
    "soundfile>=0.12.1",
    "aiofiles>=23.0.0",
    "numpy>=2.0.0",
]

# Opt-in Slovene morphological analyzer (sentence-aware lemmas + A1 morphology
# features). Deliberately an *extra*, not a dependency-group: CI and the standard
# dev setup both run `uv sync --all-groups`, which does NOT pull extras — so this
# keeps PyTorch out of CI (the lemmatizer falls back to LowercaseLemmatizer when
# classla is absent). Install it explicitly:
#     uv sync --all-groups --extra classla
# classla 2.2.1 pins torch<=2.6, but torch only ships cp314 wheels from 2.12; the
# `[tool.uv] override-dependencies` below forces a 3.14-capable torch so the
# resolve succeeds. See docs/walkthrough.md §22.2.
[project.optional-dependencies]
classla = ["classla==2.2.1"]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=5.0.0",
    "pytest-xdist>=3.6.0",
    "respx>=0.22.0",
    "ruff>=0.9.0",
    "anyio>=4.0.0",
    "fsrs-rs-python>=0.8.0",
]

[tool.uv]
# classla 2.2.1 pins torch<=2.6, which has no cp314 (Python 3.14) wheel — torch
# only gained 3.14 support at 2.12. Override the pin so the `classla` extra
# resolves on 3.14. Inert unless that extra is synced (torch isn't pulled
# otherwise), so `uv sync --all-groups` stays PyTorch-free. See walkthrough §22.2.
override-dependencies = ["torch==2.12.0"]

[tool.ruff]
target-version = "py314"
line-length = 120
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort (import ordering)
    "UP",    # pyupgrade (modernize syntax)
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
asyncio_mode = "auto"
filterwarnings = [
    # Surface ResourceWarnings (unclosed DB connections, files, etc.) so leaks are caught,
    # but ignore the "unclosed event loop" emitted during GC by pytest-asyncio's per-test
    # loop teardown (pytest_asyncio/plugin.py) — plugin-internal, not a project leak.
    "default::ResourceWarning",
    "ignore:unclosed event loop:ResourceWarning",
    # Third-party file-handle leak: reldi_tokeniser (a classla tokenizer dependency) opens
    # abbrev/punct files at import without closing them. Unfixable by us, and only present
    # when the optional `classla` extra is installed locally (never in CI). Listed LAST so
    # it takes precedence over default::ResourceWarning above (pytest inserts each filter
    # at the front, so the final entry wins).
    "ignore::ResourceWarning:reldi_tokeniser",
]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--cov=app --cov-report=term-missing"

[tool.coverage.run]
source = ["app"]
branch = true
omit = [
    # Retired one-shot migration/repair/analysis scripts (already applied to the
    # production collection, zero non-test references). See app/anki/archive/__init__.py.
    "app/anki/archive/*",
    "app/srs/build_function_word_list.py",
]

[tool.coverage.report]
fail_under = 100
show_missing = true

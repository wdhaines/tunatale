[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tunatale-backend"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.104.0",
    "uvicorn>=0.24.0",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.0.0",
    "httpx>=0.25.0",
    "python-dotenv>=1.0.0",
    "edge-tts>=6.1.0",
    "pydub>=0.25.1",
    "audioop-lts>=0.2.2",
    "aiofiles>=23.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["app"]

[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=5.0.0",
    "pytest-xdist>=3.6.0",
    "respx>=0.22.0",
    "ruff>=0.9.0",
    "anyio>=4.0.0",
]

[tool.ruff]
target-version = "py313"
line-length = 120
src = ["app", "tests"]

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort (import ordering)
    "UP",    # pyupgrade (modernize syntax)
    "B",     # flake8-bugbear
    "SIM",   # flake8-simplify
]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
asyncio_mode = "auto"
filterwarnings = [
    # Surface ResourceWarnings (unclosed DB connections, files, etc.) so leaks are caught,
    # but ignore the "unclosed event loop" emitted during GC by pytest-asyncio's per-test
    # loop teardown (pytest_asyncio/plugin.py) — plugin-internal, not a project leak.
    "default::ResourceWarning",
    "ignore:unclosed event loop:ResourceWarning",
]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "--cov=app --cov-report=term-missing"

[tool.coverage.run]
source = ["app"]
branch = true
omit = [
    "app/anki/migrate_cloze_to_production.py",
    "app/anki/dedup_tt_revlog.py",
    "app/anki/diagnose_replay_match.py",
    "app/anki/measure_stage3b_premise.py",
    "app/srs/build_function_word_list.py",
]

[tool.coverage.report]
fail_under = 100
show_missing = true

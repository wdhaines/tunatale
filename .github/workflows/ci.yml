name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check app tests scripts

      - name: Format check
        run: uv run ruff format --check app tests scripts

      - name: Mock boundary check
        run: uv run python scripts/check_mock_boundaries.py

      - name: Language literal check
        run: uv run python scripts/check_language_literals.py

      - name: Test
        run: uv run pytest -n auto

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Format check
        run: bun run fmt:check

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run check

      - name: Unit tests
        run: bun run test:coverage

  oracle-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Warm anki subprocess env
        run: uv run --isolated --no-project --python 3.14 --with anki python -c "import anki"

      - name: Oracle parity gate
        run: uv run pytest -m oracle --run-oracle -n auto --no-cov

  peer-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Warm anki subprocess env
        run: uv run --isolated --no-project --python 3.14 --with anki python -c "import anki"

      - name: Peer-sync gate
        run: uv run pytest tests/test_anki_peer_sync_selfhost.py --run-peer-sync --no-cov -v
